name: Actualizar recomendaciones

on:
  schedule:
    - cron: '0 8 * * 1'   # lunes 08:00 UTC (10:00 Madrid en verano)
  workflow_dispatch: {}
  push:
    paths:
      - 'data/profiles/**.json'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install --quiet scikit-learn

      - name: Calcular recomendaciones
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
        run: python3 scripts/engine.py

      - name: Publicar cambios
        run: |
          git config user.name "recs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sin cambios que publicar."
            exit 0
          fi
          git commit -m "Actualiza recomendaciones $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Publicado correctamente (intento $i)."
              exit 0
            fi
            echo "El repo cambió mientras tanto, reintentando ($i/5)..."
            sleep $((i * 5))
          done
          echo "No se pudo publicar tras varios intentos."
          exit 1
