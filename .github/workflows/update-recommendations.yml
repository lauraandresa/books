name: Actualizar recomendaciones

on:
  schedule:
    - cron: '0 8 * * 1'   # lunes 08:00 UTC (10:00 Madrid en verano)
  workflow_dispatch: {}
  push:
    paths:
      - 'data/profiles/**.json'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install --quiet scikit-learn

      - name: Calcular recomendaciones
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
        run: python3 scripts/engine.py

      - name: Publicar cambios
        run: |
          git config user.name "recs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Actualiza recomendaciones $(date -u +%F)"
          git push
